<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>URL编解码</title><meta name="description" content="在线URL编码解码工具，支持encodeURIComponent和decodeURIComponent。免费、无广告。"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;background:#0d1117;color:#c9d1d9;display:flex;height:100vh}.panel{flex:1;padding:1rem;display:flex;flex-direction:column}textarea{flex:1;background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:1rem;font-size:14px;resize:none;border-radius:4px}button{background:#238636;color:white;border:none;padding:.5rem 1rem;border-radius:4px;cursor:pointer;margin:.5rem 0;font-size:14px}button:hover{background:#2ea043}h3{color:#58a6ff;margin-bottom:.5rem}</style></head><body><div class="panel"><h3>输入</h3><textarea id="i" placeholder="URL or encoded string..."></textarea><button onclick="document.getElementById('o').value=encodeURIComponent(document.getElementById('i').value)">编码 encodeURIComponent</button><button onclick="try{document.getElementById('o').value=decodeURIComponent(document.getElementById('i').value)}catch(e){document.getElementById('o').value='Error: '+e.message}">解码 decodeURIComponent</button></div><div class="panel"><h3>输出</h3><textarea id="o" readonly></textarea></div></body></html>
