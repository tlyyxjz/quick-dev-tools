<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JSON转CSV</title><meta name="description" content="在线JSON转CSV工具，支持JSON数组自动展平。免费、无广告。"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;background:#0d1117;color:#c9d1d9;display:flex;height:100vh}.panel{flex:1;padding:1rem;display:flex;flex-direction:column}textarea{flex:1;background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:1rem;font-size:13px;resize:none;border-radius:4px;min-height:40%}textarea.result{flex:0.5}button{background:#238636;color:white;border:none;padding:.5rem 1rem;border-radius:4px;cursor:pointer;margin:.5rem 0;font-size:14px}h3{color:#58a6ff;margin-bottom:.5rem}</style></head><body><div class="panel"><h3>JSON Array</h3><textarea id="json" placeholder="[{"name":"Alice","age":30}]"></textarea><button onclick="convert()">Convert to CSV</button><button onclick="downloadCsv()">Download CSV</button></div><div class="panel"><h3>CSV Output</h3><textarea id="csv" class="result" readonly></textarea></div><script>var csvData='';function convert(){try{var data=JSON.parse(document.getElementById('json').value);if(!Array.isArray(data)||!data.length){document.getElementById('csv').value='Need a non-empty JSON array';return}var keys=Object.keys(data[0]);csvData=keys.join(',')+'\n';data.forEach(function(r){csvData+=keys.map(function(k){var v=r[k];if(v===null||v===undefined)return'';if(typeof v==='string')return '"'+v.replace(/"/g,'""')+'"';return v}).join(',')+'\n'});document.getElementById('csv').value=csvData}catch(e){document.getElementById('csv').value='Invalid JSON: '+e.message}}function downloadCsv(){if(!csvData)convert();var b=new Blob([csvData],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='data.csv';a.click()}</script></body></html>
