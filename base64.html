<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Base64编解码</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;background:#0d1117;color:#c9d1d9;display:flex;height:100vh}.panel{flex:1;padding:1rem;display:flex;flex-direction:column}textarea{flex:1;background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:1rem;font-family:monospace;font-size:14px;resize:none;border-radius:4px}button{background:#238636;color:white;border:none;padding:.5rem 1rem;border-radius:4px;cursor:pointer;margin:.5rem 0;font-size:14px}</style></head>
<body>
<div class="panel"><h3 style="color:#58a6ff;margin-bottom:.5rem">输入</h3><textarea id="input" placeholder="输入文本或Base64字符串..."></textarea><button onclick="encode()">编码 Base64</button><button onclick="decode()">解码 Base64</button></div>
<div class="panel"><h3 style="color:#58a6ff;margin-bottom:.5rem">输出</h3><textarea id="output" placeholder="结果..." readonly></textarea></div>
<script>
function encode(){try{document.getElementById('output').value=btoa(unescape(encodeURIComponent(document.getElementById('input').value)))}catch(e){document.getElementById('output').value='❌ '+e.message}}
function decode(){try{document.getElementById('output').value=decodeURIComponent(escape(atob(document.getElementById('input').value.trim())))}catch(e){document.getElementById('output').value='❌ '+e.message}}
</script></body></html>
