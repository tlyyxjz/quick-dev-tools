<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>JSON格式化</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;background:#0d1117;color:#c9d1d9;display:flex;height:100vh}.panel{flex:1;padding:1rem;display:flex;flex-direction:column}textarea{flex:1;background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:1rem;font-family:monospace;font-size:14px;resize:none;border-radius:4px}button{background:#238636;color:white;border:none;padding:.5rem 1rem;border-radius:4px;cursor:pointer;margin:.5rem 0;font-size:14px}button:hover{background:#2ea043}</style></head>
<body>
<div class="panel"><h3 style="color:#58a6ff;margin-bottom:.5rem">输入</h3><textarea id="input" placeholder='粘贴JSON或JavaScript对象...'></textarea><button onclick="format()">格式化</button><button onclick="compress()">压缩</button><button onclick="validate()">验证</button></div>
<div class="panel"><h3 style="color:#58a6ff;margin-bottom:.5rem">输出</h3><textarea id="output" placeholder="结果..." readonly></textarea></div>
<script>
function format(){try{const o=JSON.parse(document.getElementById('input').value);document.getElementById('output').value=JSON.stringify(o,null,2)}catch(e){document.getElementById('output').value='❌ '+e.message}}
function compress(){try{const o=JSON.parse(document.getElementById('input').value);document.getElementById('output').value=JSON.stringify(o)}catch(e){document.getElementById('output').value='❌ '+e.message}}
function validate(){try{JSON.parse(document.getElementById('input').value);document.getElementById('output').value='✅ 有效JSON'}catch(e){document.getElementById('output').value='❌ 无效: '+e.message}}
</script></body></html>
