<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>文本对比Diff</title><meta name="description" content="在线文本对比工具，逐行比较差异。免费、无广告。"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;background:#0d1117;color:#c9d1d9;display:flex;height:100vh;flex-direction:column;padding:1rem}h1{color:#58a6ff;margin-bottom:.5rem}.panels{display:flex;gap:1rem;flex:1}textarea{flex:1;background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:.5rem;font-size:13px;resize:none;border-radius:4px}button{background:#238636;color:white;border:none;padding:.5rem 1rem;border-radius:4px;cursor:pointer;margin:.5rem 0;font-size:14px}.output{background:#161b22;border:1px solid #30363d;border-radius:4px;padding:1rem;flex:1;overflow-y:auto;font-size:13px;line-height:1.6}.add{background:#1a3a2a}.del{background:#3a1a1a}</style></head><body><h1>Text Diff</h1><div class="panels"><textarea id="old" placeholder="Original text..."></textarea><textarea id="new" placeholder="New text..."></textarea></div><button onclick="diff()">Compare</button><div class="output" id="out"></div><script>function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}function diff(){var a=document.getElementById('old').value.split('\n');var b=document.getElementById('new').value.split('\n');var max=Math.max(a.length,b.length);var h='';for(var i=0;i<max;i++){if(a[i]===b[i])h+='<div>  '+esc(a[i]||'')+'</div>';else{if(a[i]!==undefined)h+='<div class="del">- '+esc(a[i])+'</div>';if(b[i]!==undefined)h+='<div class="add">+ '+esc(b[i])+'</div>'}}document.getElementById('out').innerHTML=h||'No differences'}</script></body></html>
