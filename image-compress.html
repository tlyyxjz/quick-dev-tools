<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>图片压缩</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;background:#0d1117;color:#c9d1d9;padding:2rem;max-width:600px;margin:0 auto}h1{color:#58a6ff;margin-bottom:1rem}.dropzone{border:2px dashed #30363d;border-radius:8px;padding:3rem;text-align:center;cursor:pointer;margin:1rem 0}.dropzone:hover{border-color:#58a6ff}canvas{max-width:100%;margin-top:1rem;border-radius:4px}.info{color:#8b949e;font-size:.85rem;margin-top:.5rem}</style></head>
<body><h1>🖼 图片压缩</h1><p style="color:#8b949e;margin-bottom:1rem">纯浏览器本地压缩，不传服务器</p>
<div class="dropzone" onclick="document.getElementById('file').click()">点击选择图片或拖拽</div>
<input type="file" id="file" accept="image/*" style="display:none" onchange="compress(event)">
<canvas id="canvas"></canvas>
<div id="info" class="info"></div>
<script>
function compress(e){
  const f=e.target.files[0];if(!f)return;
  const img=new Image();
  img.onload=function(){
    const c=document.getElementById('canvas');c.width=img.width;c.height=img.height;
    const ctx=c.getContext('2d');ctx.drawImage(img,0,0);
    const orig=f.size,c1=c.toDataURL('image/jpeg',0.7);const csize=atob(c1.split(',')[1]).length;
    document.getElementById('info').innerHTML=`原始: ${(orig/1024).toFixed(1)}KB → 压缩: ${(csize/1024).toFixed(1)}KB (${((1-csize/orig)*100).toFixed(0)}% 减小)<br><a href="${c1}" download="compressed.jpg" style="color:#58a6ff">⬇ 下载</a>`;
    document.getElementById('canvas').style.display='block';
  };img.src=URL.createObjectURL(f)
}
</script></body></html>
