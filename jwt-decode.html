<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JWT解析</title><meta name="description" content="在线JWT Token解析工具，解码Header和Payload。免费、无广告。"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;background:#0d1117;color:#c9d1d9;padding:2rem;max-width:800px;margin:0 auto}h1{color:#58a6ff;margin-bottom:1rem}textarea{width:100%;background:#161b22;border:1px solid #30363d;color:#c9d1d9;padding:1rem;font-size:14px;border-radius:4px;resize:vertical;min-height:100px}button{background:#238636;color:white;border:none;padding:.8rem 1.5rem;border-radius:4px;cursor:pointer;margin:1rem 0;font-size:14px}.result{background:#161b22;border-radius:4px;padding:1rem;margin:1rem 0;overflow-x:auto}pre{margin:0;white-space:pre-wrap;word-break:break-all;font-size:13px}</style></head><body><h1>JWT Token 解析</h1><textarea id="jwt" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIn0..."></textarea><button onclick="decode()">解析</button><div class="result" id="result"></div><script>function b64(s){s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';try{return JSON.stringify(JSON.parse(atob(s)),null,2)}catch(e){return atob(s)}}function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;')}function decode(){try{var p=document.getElementById('jwt').value.trim().split('.');if(p.length!==3){document.getElementById('result').innerHTML='Need 3 parts';return}document.getElementById('result').innerHTML='<div style="color:#f0883e">Header</div><pre>'+esc(b64(p[0]))+'</pre><div style="color:#f0883e;margin-top:.5rem">Payload</div><pre>'+esc(b64(p[1]))+'</pre><div style="color:#8b949e;margin-top:.5rem">Signature: '+p[2].substring(0,20)+'...</div>'}catch(e){document.getElementById('result').innerHTML='Error: '+e.message}</script></body></html>
