<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>UUID生成器</title><meta name="description" content="在线UUID v4生成器，支持批量生成。免费、无广告。"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:monospace;background:#0d1117;color:#c9d1d9;padding:2rem;max-width:600px;margin:0 auto}h1{color:#58a6ff;margin-bottom:1rem}button{background:#238636;color:white;border:none;padding:.8rem 1.5rem;border-radius:4px;cursor:pointer;margin:.5rem;font-size:14px}button:hover{background:#2ea043}.result{background:#161b22;border-radius:4px;padding:1rem;margin:1rem 0}.result div{font-family:monospace;padding:.3rem 0;color:#7ee787;font-size:15px;user-select:all}</style></head><body><h1>UUID 生成器</h1><div style="margin:1rem 0"><button onclick="gen(1)">Generate 1</button><button onclick="gen(10)">Generate 10</button><button onclick="gen(50)">Generate 50</button></div><div class="result" id="result"></div><script>function gen(n){var a=[];for(var i=0;i<n;i++)a.push(crypto.randomUUID());document.getElementById('result').innerHTML=a.map(function(u){return '<div>'+u+'</div>'}).join('')}</script></body></html>
